name: CI

on:
  push:
    branches: [master, main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # The pure-function tests import the module but NOT keepercommander
      # (it is imported lazily inside the live-only functions), so CI needs no
      # third-party deps and no Keeper session.
      - name: Syntax check
        run: python -m py_compile gen_team_folder_batch.py tests/test_plan.py

      - name: Import check (module loads without keepercommander)
        run: python -c "import gen_team_folder_batch; print('import OK')"

      - name: Unit tests
        run: python -m unittest discover -s tests -v
